<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- AI pulse / waveform icon: stylized "A" with circuit dot -->
  <!-- Left leg of A -->
  <polyline points="10,50 24,14 32,32" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right leg of A -->
  <polyline points="32,32 40,14 54,50" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Crossbar -->
  <line x1="18" y1="36" x2="46" y2="36" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Circuit dot at peak -->
  <circle cx="32" cy="14" r="3.5" fill="#93c5fd"/>
</svg>